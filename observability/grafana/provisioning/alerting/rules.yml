apiVersion: 1

groups:
  - orgId: 1
    name: trip-search
    folder: Trip Search
    interval: 1m
    rules:
      - uid: trip-search-p95
        title: Trip search p95 > 3s
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(trip_search_duration_ms_bucket[5m])) by (le))
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [3000]
                    type: gt
                  operator:
                    type: and
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Trip search p95 latency above 3s
        labels:
          severity: warning

      - uid: trip-search-quorum
        title: Quorum failure rate > 5%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(trip_search_total{status_code="503"}[5m])) / clamp_min(sum(rate(trip_search_total[5m])), 0.001)
              intervalMs: 1000
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query
        for: 5m
        annotations:
          summary: Trip search quorum failure rate above 5%
        labels:
          severity: critical

      - uid: trip-search-redis
        title: Redis connection down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: redis_connection_up
              intervalMs: 1000
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  reducer:
                    type: last
                  type: query
        for: 1m
        annotations:
          summary: Redis connection unhealthy
        labels:
          severity: critical
